<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>玉石鉴定 · WBP_JadeAppraisal 预览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0c1410;
      --jade-deep: #0f3d32;
      --jade: #1a6b54;
      --jade-mid: #2a9a76;
      --jade-light: #6fd4b0;
      --jade-mist: #c8f0df;
      --gold: #d4b56a;
      --gold-bright: #f0d78c;
      --gold-dim: #8a7340;
      --danger: #c45c4a;
      --panel: rgba(8, 22, 18, 0.88);
      --panel-edge: rgba(212, 181, 106, 0.45);
      --cell: rgba(18, 48, 40, 0.92);
      --cell-hover: rgba(36, 90, 72, 0.95);
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      color: var(--jade-mist);
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(42, 154, 118, 0.22), transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(212, 181, 106, 0.08), transparent 50%),
        linear-gradient(165deg, #06110d 0%, #0a1a14 40%, #07140f 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.015) 2px,
          rgba(255, 255, 255, 0.015) 3px
        );
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      width: min(440px, 100%);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .panel {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: 4px;
      box-shadow: var(--shadow);
      padding: 22px 22px 18px;
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(212, 181, 106, 0.12) 0%, transparent 28%),
        linear-gradient(225deg, rgba(111, 212, 176, 0.08) 0%, transparent 30%);
      pointer-events: none;
    }

    .panel::after {
      content: "";
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
      opacity: 0.7;
    }

    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.65;
      z-index: 2;
    }
    .corner.tl { top: 8px; left: 8px; border-width: 1.5px 0 0 1.5px; }
    .corner.tr { top: 8px; right: 8px; border-width: 1.5px 1.5px 0 0; }
    .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1.5px 1.5px; }
    .corner.br { bottom: 8px; right: 8px; border-width: 0 1.5px 1.5px 0; }

    .header {
      position: relative;
      text-align: center;
      margin-bottom: 14px;
      padding-top: 4px;
    }

    .brand {
      font-family: "Noto Serif SC", serif;
      font-size: 11px;
      letter-spacing: 0.45em;
      color: var(--gold);
      text-indent: 0.45em;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .title {
      font-family: "Noto Serif SC", serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      color: #e8f7f0;
      text-shadow: 0 0 24px rgba(111, 212, 176, 0.35);
    }

    .title-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .title-line span {
      display: block;
      height: 1px;
      width: 48px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .value-card {
      position: relative;
      margin: 16px 0 12px;
      padding: 14px 16px;
      background:
        linear-gradient(180deg, rgba(26, 107, 84, 0.35), rgba(12, 36, 28, 0.55));
      border: 1px solid rgba(111, 212, 176, 0.28);
      border-radius: 2px;
      text-align: center;
      overflow: hidden;
    }

    .value-card::before {
      content: "";
      position: absolute;
      inset: -40% -20%;
      background: radial-gradient(circle at 50% 50%, rgba(240, 215, 140, 0.12), transparent 55%);
      animation: shimmer 4.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%, 100% { transform: translateX(-8%); opacity: 0.5; }
      50% { transform: translateX(8%); opacity: 1; }
    }

    .value-label {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--jade-light);
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .value-num {
      font-family: "Noto Serif SC", serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.06em;
      line-height: 1.1;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .value-num.bump {
      transform: scale(1.08);
      color: #fff4c8;
    }

    .hint {
      text-align: center;
      font-size: 13px;
      color: rgba(200, 240, 223, 0.62);
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 10px;
      margin-bottom: 14px;
      font-size: 11px;
      color: rgba(200, 240, 223, 0.55);
      letter-spacing: 0.04em;
    }

    .legend i {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 1px;
      margin-right: 4px;
      vertical-align: middle;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .cell {
      aspect-ratio: 1;
      border: 1px solid rgba(111, 212, 176, 0.22);
      background:
        linear-gradient(160deg, rgba(30, 70, 56, 0.9), var(--cell));
      border-radius: 3px;
      color: rgba(200, 240, 223, 0.55);
      font-size: 20px;
      font-family: "Noto Serif SC", serif;
      cursor: pointer;
      transition:
        background 0.2s ease,
        border-color 0.2s ease,
        transform 0.15s ease,
        box-shadow 0.2s ease,
        color 0.2s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .cell::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.12), transparent 45%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .cell:not(:disabled):hover {
      background: var(--cell-hover);
      border-color: rgba(212, 181, 106, 0.55);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      color: var(--jade-mist);
    }

    .cell:not(:disabled):hover::after { opacity: 1; }

    .cell:not(:disabled):active {
      transform: translateY(0) scale(0.96);
    }

    .cell:disabled {
      cursor: default;
      opacity: 1;
    }

    .cell.lv1 { border-color: #6a7a72; color: #9aa89f; background: linear-gradient(160deg, #2a3832, #1a2420); }
    .cell.lv2 { border-color: #5a8a72; color: #8fc4a8; background: linear-gradient(160deg, #244838, #163028); }
    .cell.lv3 { border-color: #3aaa78; color: #7eecc0; background: linear-gradient(160deg, #1e6a4e, #124030); box-shadow: inset 0 0 12px rgba(111, 212, 176, 0.2); }
    .cell.lv4 { border-color: #c9a84a; color: #f0d78c; background: linear-gradient(160deg, #5a4a20, #2e2810); box-shadow: 0 0 14px rgba(212, 181, 106, 0.25); }
    .cell.lv5 {
      border-color: #f0d78c;
      color: #fff8d6;
      background: linear-gradient(160deg, #7a6230, #3a2e12);
      box-shadow: 0 0 18px rgba(240, 215, 140, 0.4);
      animation: glow 1.6s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(240, 215, 140, 0.25); }
      to { box-shadow: 0 0 22px rgba(240, 215, 140, 0.55); }
    }

    .cell.reveal {
      animation: flip 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes flip {
      0% { transform: rotateY(90deg) scale(0.85); opacity: 0.3; }
      100% { transform: rotateY(0) scale(1); opacity: 1; }
    }

    .actions {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 10px;
    }

    .btn {
      position: relative;
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 12px 10px;
      font-family: inherit;
      font-size: 15px;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.2s ease, opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-sell {
      background: linear-gradient(180deg, #3d8f6c, #1f5a44);
      border-color: rgba(111, 212, 176, 0.45);
      color: #e8f7f0;
      box-shadow: 0 4px 14px rgba(26, 107, 84, 0.4);
    }

    .btn-sell:not(:disabled):hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(42, 154, 118, 0.5);
    }

    .btn-close {
      background: transparent;
      border-color: rgba(196, 92, 74, 0.55);
      color: #e8b4ac;
    }

    .btn-close:not(:disabled):hover {
      background: rgba(196, 92, 74, 0.15);
      transform: translateY(-1px);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 72px;
      transform: translateX(-50%) translateY(8px);
      background: rgba(12, 28, 22, 0.95);
      border: 1px solid var(--gold-dim);
      color: var(--gold-bright);
      padding: 8px 16px;
      font-size: 13px;
      letter-spacing: 0.1em;
      border-radius: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap;
      z-index: 5;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .meta {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: rgba(200, 240, 223, 0.35);
      letter-spacing: 0.06em;
      line-height: 1.6;
    }

    .meta code {
      color: rgba(212, 181, 106, 0.65);
      font-family: ui-monospace, Consolas, monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="panel" id="panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <header class="header">
        <div class="brand">JADE APPRAISAL</div>
        <h1 class="title">玉石鉴定</h1>
        <div class="title-line"><span></span><span></span></div>
      </header>

      <div class="value-card">
        <div class="value-label">当前价值</div>
        <div class="value-num" id="valueNum">600</div>
      </div>

      <p class="hint">点击格子揭示品相（1～5 级等概率）· 可随时出售</p>

      <div class="legend">
        <span><i style="background:#6a7a72"></i>1 折半</span>
        <span><i style="background:#5a8a72"></i>2 ×2/3</span>
        <span><i style="background:#3aaa78"></i>3 +200</span>
        <span><i style="background:#c9a84a"></i>4 +800</span>
        <span><i style="background:#f0d78c"></i>5 +1200</span>
      </div>

      <div class="grid" id="grid" aria-label="鉴定格子 5x5"></div>

      <div class="actions">
        <button class="btn btn-sell" id="btnSell" type="button">出售结算</button>
        <button class="btn btn-close" id="btnClose" type="button">关闭</button>
      </div>

      <div class="toast" id="toast"></div>
    </div>

    <p class="meta">
      预览对应控件：<code>WBP_JadeAppraisal</code><br />
      逻辑对齐 Lua：基数 600 · 25 格 · 卖出后锁定
    </p>
  </div>

  <script>
    const BASE_VALUE = 600;
    const CELL_COUNT = 25;

    const LEVEL_META = {
      1: { label: "1", cls: "lv1" },
      2: { label: "2", cls: "lv2" },
      3: { label: "3", cls: "lv3" },
      4: { label: "4", cls: "lv4" },
      5: { label: "5", cls: "lv5" },
    };

    function applyLevelToValue(value, level) {
      if (level === 5) return value + 1200;
      if (level === 4) return value + 800;
      if (level === 3) return value + 200;
      if (level === 2) return value * (2 / 3);
      if (level === 1) return value * 0.5;
      return value;
    }

    const state = {
      currentValue: BASE_VALUE,
      opened: Object.create(null),
      selling: false,
    };

    const grid = document.getElementById("grid");
    const valueNum = document.getElementById("valueNum");
    const btnSell = document.getElementById("btnSell");
    const btnClose = document.getElementById("btnClose");
    const toast = document.getElementById("toast");

    function refreshValue() {
      const n = Math.floor(state.currentValue + 0.5);
      valueNum.textContent = String(n);
      valueNum.classList.remove("bump");
      void valueNum.offsetWidth;
      valueNum.classList.add("bump");
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function onCellClick(index, btn) {
      if (state.selling || state.opened[index]) return;

      const level = 1 + Math.floor(Math.random() * 5);
      state.opened[index] = level;
      state.currentValue = applyLevelToValue(state.currentValue, level);

      const meta = LEVEL_META[level];
      btn.textContent = meta.label;
      btn.classList.add(meta.cls, "reveal");
      btn.disabled = true;

      refreshValue();
    }

    for (let i = 0; i < CELL_COUNT; i++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "cell";
      btn.textContent = "?";
      btn.setAttribute("aria-label", "格子 " + i);
      btn.addEventListener("click", () => onCellClick(i, btn));
      grid.appendChild(btn);
    }

    btnSell.addEventListener("click", () => {
      if (state.selling) return;
      state.selling = true;
      btnSell.disabled = true;
      grid.querySelectorAll(".cell").forEach((c) => { c.disabled = true; });
      const sellValue = Math.max(0, Math.floor(state.currentValue + 0.5));
      showToast("售出 · 获得 " + sellValue + " 金币");
    });

    btnClose.addEventListener("click", () => {
      document.getElementById("panel").style.transition = "opacity 0.35s, transform 0.35s";
      document.getElementById("panel").style.opacity = "0";
      document.getElementById("panel").style.transform = "scale(0.96)";
      showToast("面板已关闭（预览）");
      setTimeout(() => {
        document.getElementById("panel").style.opacity = "1";
        document.getElementById("panel").style.transform = "scale(1)";
        // 预览模式：关闭后重置，方便继续体验
        location.reload();
      }, 900);
    });

    refreshValue();
  </script>
</body>
</html>
